<!DOCTYPE html>
<html>
    <head>
    <title>Closet Organization Guide</title>
    </head>
<style>
body {
font-family: Arial, sans-serif;
text-align: center;
}


#filter-buttons button {
margin: 5px;
padding: 10px;
cursor: pointer;
}

#closet-container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 20px;
}

.clothing {
    display: none;
    width: 200px;
    margin: 10px;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 10px;
    text-align: center;
}

clothing img {
    width: 100%;
    height: 150px;
    object-fit: cover;
    border-radius: 10px;
}


.show {
display: block;
}

clothing:hover {
    transform: scale(1.05);
    transition: 0.3;
}

</style>
</head>

<body>

<h1>Closet Organization Guide</h1>
<p>Learn how to organize your closet simply and effectively.</p>
<p>Stay organized every day!</p>

<h2>My Closet System</h2>

<!-- FILTER BUTTONS -->
<div id="filter-buttons">
<button onclick="filterSelection('all')">All</button>
<button onclick="filterSelection('work')">Work</button>
<button onclick="filterSelection('goingout')">Going Out</button>
<button onclick="filterSelection('workout')">Workout</button>
<button onclick="filterSelection('dresses')">Dresses</button>
<button onclick="filterSelection('winter')">Winter</button>
</div>

<div id="closet-container">
<div class="clothing work"><img src="images/blazer.webp" alt="Work blazer outfit"> <p>Blazer Outfit</p></div>
<div class="clothing goingout">✨ Dinner Outfit </div>
<div class="clothing workout">🏋️ Gym Set </div>
<div class="clothing dresses">👗 Summer Dress </div>
<div class="clothing winter">🧥 Coat Outfit </div>
</div>

<script>
filterSelection("all");

function filterSelection(category) {
let items = document.getElementsByClassName("clothing");

for (let i = 0; i < items.length; i++) {
items[i].classList.remove("show");

if (category === "all" || items[i].classList.contains(category)) {
items[i].classList.add("show");
}
}
}
</script>

</body>
</html>
